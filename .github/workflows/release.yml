name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without v prefix, e.g. 0.1.0)"
        required: true
        default: "0.1.0"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.event.inputs.version) }}

jobs:
  build-cli:
    name: CLI (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: x86_64-pc-windows-msvc
            archive: zip
            bin: dayrecord.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: aarch64-apple-darwin
            archive: tar.gz
            bin: dayrecord
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin: dayrecord
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libsecret-1-dev pkg-config

      - name: Build release CLI
        run: cargo build --release -p dayrecord-cli --target ${{ matrix.target }}

      - name: Package CLI archive (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG -replace '^v',''
          $staging = "dayrecord-$version-${{ matrix.artifact_name }}"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" $staging
          Copy-Item README.md, LICENSE, PRIVACY.md $staging
          Compress-Archive -Path "$staging/*" -DestinationPath "$staging.zip" -Force
          Get-ChildItem "$staging.zip"

      - name: Package CLI archive (Unix)
        if: matrix.archive != 'zip'
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          STAGING="dayrecord-${VERSION}-${{ matrix.artifact_name }}"
          mkdir -p "$STAGING"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$STAGING/"
          cp README.md LICENSE PRIVACY.md "$STAGING/"
          tar czf "${STAGING}.tar.gz" -C "$(dirname "$STAGING")" "$(basename "$STAGING")"
          ls -la "${STAGING}.tar.gz"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.artifact_name }}
          path: dayrecord-*-${{ matrix.artifact_name }}.*

  build-windows-gui:
    name: Windows GUI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Generate Tauri icons
        shell: pwsh
        run: ./scripts/generate-icons.ps1

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --force

      - name: Build Tauri bundle
        working-directory: crates/dayrecord-app
        run: cargo tauri build --release

      - name: Upload GUI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-gui
          path: |
            crates/dayrecord-app/target/release/bundle/**/*.msi
            crates/dayrecord-app/target/release/bundle/**/*.exe
            crates/dayrecord-app/target/release/bundle/**/*.zip

  release:
    name: Publish GitHub Release
    needs: [build-cli, build-windows-gui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.msi" -o -name "*.exe" \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: DayRecord ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
